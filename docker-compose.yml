services:
  flow-data-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flow-data-app
    environment:
      - PORT=3001
      - NITRO_PORT=3001
      - NUXT_PORT=3001
      - API_BASE_URL=http://localhost:3333
    ports:
      - "3001:3001"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
